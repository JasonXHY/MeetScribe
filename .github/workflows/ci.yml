name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lightweight deps
        # 仅安装可在 CI 运行的轻依赖；funasr / pyaudiowpatch（重型/仅 Windows）不在 CI 安装，
        # 对应的 e2e_heavy / e2e_network 用例会自动 skip（见 tests/conftest.py）。
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 numpy soundfile openai pytest pytest-qt pytest-timeout

      - name: Run unit + integration tests (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          # pytest.ini 默认 addopts 已排除 e2e_heavy / e2e_network。
          python -m pytest tests/ -p no:cacheprovider
