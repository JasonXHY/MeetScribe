[pytest]
# 默认只跑可在干净环境稳定运行的测试（unit + integration）。
# heavy（funasr/模型/真实音频）与 network（真实云端 API）默认不跑，需显式 -m 选择。
# 注：QT_QPA_PLATFORM=offscreen 在 conftest.py 中设置（避免依赖 pytest-env 插件）。
addopts = -q -m "not e2e_heavy and not e2e_network"

markers =
    unit: 纯单元测试，无外部依赖（CI 必跑）
    integration: 需要 PySide6/qtbot，offscreen 可跑（CI 跑）
    e2e_heavy: 需要 funasr + CAM++ 模型 + 真实音频 fixtures（默认 skip，本地手动跑）
    e2e_network: 需要真实云端 API Key（默认 skip，本地手动跑）
    gui: 标记需要图形界面环境的测试
    timeout: 设置测试超时时间（秒）
