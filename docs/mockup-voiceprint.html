<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>侧耳倾听 - 音色库页 Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; background: #F8F9FA; color: #111827; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── TopBar ── */
  .topbar { height: 44px; background: #FFF; border-bottom: 1px solid #E5E7EB; display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; }
  .topbar-brand { font-size: 15px; font-weight: 700; color: #3B82F6; margin-right: 24px; letter-spacing: 0.5px; }
  .topbar-nav { display: flex; gap: 4px; }
  .topbar-nav a { padding: 6px 14px; border-radius: 6px; font-size: 13px; color: #6B7280; text-decoration: none; cursor: pointer; transition: all 0.15s; }
  .topbar-nav a:hover { background: #F3F4F6; color: #111827; }
  .topbar-nav a.active { background: #EFF6FF; color: #3B82F6; font-weight: 500; }
  .topbar-version { margin-left: auto; font-size: 11px; color: #9CA3AF; }

  /* ── Page ── */
  .page { flex: 1; display: flex; flex-direction: column; padding: 20px 24px 12px; overflow: hidden; }
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .page-title { font-size: 24px; font-weight: 700; color: #111827; }

  /* ── Buttons ── */
  .btn { height: 32px; padding: 0 16px; border-radius: 6px; font-size: 13px; font-family: inherit; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 4px; transition: all 0.15s; white-space: nowrap; }
  .btn-primary { background: #3B82F6; color: #FFF; }
  .btn-primary:hover { background: #2563EB; }
  .btn-danger { background: #EF4444; color: #FFF; }
  .btn-danger:hover { background: #DC2626; }
  .btn-secondary { background: transparent; color: #6B7280; border: 1px solid #E5E7EB; }
  .btn-secondary:hover { background: #F3F4F6; }
  .btn-danger-outline { background: transparent; color: #EF4444; border: 1px solid #FCA5A5; }
  .btn-danger-outline:hover { background: #FEF2F2; }

  /* ── Content Area ── */
  .content { flex: 1; display: flex; gap: 12px; overflow: hidden; min-height: 0; }

  /* ── Speaker List Panel ── */
  .list-panel { width: 280px; min-width: 280px; background: #FFF; border: 1px solid #E5E7EB; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
  .list-header { padding: 12px 14px; border-bottom: 1px solid #F3F4F6; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .list-header .title { font-size: 13px; font-weight: 600; color: #111827; }
  .list-header .count { font-size: 11px; color: #9CA3AF; }
  .list-body { flex: 1; overflow-y: auto; padding: 4px; }

  .speaker-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px; cursor: pointer; transition: background 0.1s; margin-bottom: 2px; }
  .speaker-item:hover { background: #F9FAFB; }
  .speaker-item.selected { background: #EFF6FF; }
  .speaker-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #FFF; flex-shrink: 0; }
  .speaker-info { flex: 1; min-width: 0; }
  .speaker-name { font-size: 13px; font-weight: 500; color: #111827; }
  .speaker-meta { font-size: 11px; color: #9CA3AF; margin-top: 1px; }

  /* ── Detail Panel ── */
  .detail-panel { flex: 1; background: #FFF; border: 1px solid #E5E7EB; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
  .detail-header { padding: 16px 20px; border-bottom: 1px solid #F3F4F6; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .detail-name { font-size: 18px; font-weight: 700; color: #111827; }
  .detail-actions { display: flex; gap: 6px; }
  .detail-body { flex: 1; overflow-y: auto; padding: 16px 20px; }

  /* ── Info Card ── */
  .info-card { background: #F9FAFB; border-radius: 6px; padding: 12px 16px; margin-bottom: 16px; }
  .info-row { display: flex; align-items: center; padding: 4px 0; }
  .info-label { font-size: 12px; color: #9CA3AF; min-width: 80px; }
  .info-value { font-size: 13px; color: #111827; }

  /* ── Section Title ── */
  .section-title { font-size: 13px; font-weight: 600; color: #111827; margin-bottom: 8px; }

  /* ── Sample List ── */
  .sample-card { background: #F9FAFB; border-radius: 6px; overflow: hidden; }
  .sample-row { display: flex; align-items: center; padding: 8px 16px; border-bottom: 1px solid #F3F4F6; }
  .sample-row:last-child { border-bottom: none; }
  .sample-label { font-size: 12px; color: #6B7280; min-width: 60px; }
  .sample-source { font-size: 12px; color: #9CA3AF; flex: 1; }
  .sample-quality { font-size: 11px; color: #9CA3AF; }
  .quality-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .quality-good { background: #ECFDF5; color: #059669; }
  .quality-fair { background: #FEF3C7; color: #D97706; }

  /* ── Empty State ── */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9CA3AF; }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
  .empty-state .title { font-size: 15px; margin-bottom: 4px; }
  .empty-state .hint { font-size: 12px; }

  /* ── Status Bar ── */
  .statusbar { height: 28px; background: #FAFAFA; border-top: 1px solid #E5E7EB; display: flex; align-items: center; padding: 0 12px; font-size: 11px; color: #9CA3AF; flex-shrink: 0; }
  .statusbar .info { margin-left: auto; }

  /* ── Dialog Overlay ── */
  .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .dialog { background: #FFF; border-radius: 12px; width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); overflow: hidden; }
  .dialog-header { padding: 20px 24px 0; }
  .dialog-title { font-size: 16px; font-weight: 700; color: #111827; margin-bottom: 4px; }
  .dialog-subtitle { font-size: 12px; color: #9CA3AF; }
  .dialog-body { padding: 16px 24px; }

  /* ── Dialog Form ── */
  .dialog-label { font-size: 12px; color: #6B7280; margin-bottom: 6px; }
  .dialog-input { width: 100%; height: 36px; padding: 0 12px; border: 1px solid #E5E7EB; border-radius: 6px; font-size: 13px; font-family: inherit; color: #111827; outline: none; transition: border-color 0.15s; }
  .dialog-input:focus { border-color: #3B82F6; }
  .dialog-input::placeholder { color: #9CA3AF; }

  /* ── Text Card ── */
  .preset-card { background: #FFF; border: 1px solid #E5E7EB; border-radius: 8px; padding: 12px 16px; margin-top: 12px; }
  .preset-title { font-size: 12px; font-weight: 600; color: #6B7280; margin-bottom: 6px; }
  .preset-text { font-size: 13px; color: #111827; line-height: 1.6; }
  .preset-divider { height: 1px; background: #E5E7EB; margin: 10px 0; }

  /* ── Recording State ── */
  .rec-state { display: flex; align-items: center; gap: 8px; }
  .rec-indicator { width: 8px; height: 8px; border-radius: 50%; background: #D1D5DB; }
  .rec-indicator.active { background: #EF4444; animation: blink 1s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .rec-text { font-size: 12px; color: #9CA3AF; }
  .rec-text.active { color: #EF4444; font-weight: 500; }

  /* ── Waveform ── */
  .waveform { display: flex; align-items: center; gap: 2px; height: 24px; margin-top: 8px; }
  .waveform .bar { width: 3px; background: #E5E7EB; border-radius: 1.5px; transition: height 0.1s; }
  .waveform.active .bar { background: #EF4444; }
  .waveform .bar:nth-child(1) { height: 8px; }
  .waveform .bar:nth-child(2) { height: 14px; }
  .waveform .bar:nth-child(3) { height: 6px; }
  .waveform .bar:nth-child(4) { height: 18px; }
  .waveform .bar:nth-child(5) { height: 10px; }
  .waveform .bar:nth-child(6) { height: 16px; }
  .waveform .bar:nth-child(7) { height: 8px; }
  .waveform .bar:nth-child(8) { height: 12px; }
  .waveform .bar:nth-child(9) { height: 20px; }
  .waveform .bar:nth-child(10) { height: 6px; }
  .waveform .bar:nth-child(11) { height: 14px; }
  .waveform .bar:nth-child(12) { height: 8px; }
  .waveform .bar:nth-child(13) { height: 16px; }
  .waveform .bar:nth-child(14) { height: 10px; }
  .waveform .bar:nth-child(15) { height: 4px; }

  /* ── Dialog Footer ── */
  .dialog-footer { padding: 12px 24px 20px; display: flex; align-items: center; gap: 8px; }
  .dialog-footer .spacer { flex: 1; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }
</style>
</head>
<body>

<!-- TopBar -->
<div class="topbar">
  <span class="topbar-brand">侧耳倾听</span>
  <div class="topbar-nav">
    <a>主页</a>
    <a class="active">音色库</a>
    <a>设置</a>
  </div>
  <span class="topbar-version">MeetScribe v1.0</span>
</div>

<!-- Page -->
<div class="page">
  <div class="page-header">
    <span class="page-title">音色库管理</span>
    <button class="btn btn-primary">+ 添加音色</button>
  </div>

  <div class="content">
    <!-- Left: Speaker List -->
    <div class="list-panel">
      <div class="list-header">
        <span class="title">说话人列表</span>
        <span class="count">3 人</span>
      </div>
      <div class="list-body">
        <div class="speaker-item selected">
          <div class="speaker-avatar" style="background:#4A90D9;">张</div>
          <div class="speaker-info">
            <div class="speaker-name">张三</div>
            <div class="speaker-meta">3 个样本</div>
          </div>
        </div>
        <div class="speaker-item">
          <div class="speaker-avatar" style="background:#E67E22;">李</div>
          <div class="speaker-info">
            <div class="speaker-name">李四</div>
            <div class="speaker-meta">1 个样本</div>
          </div>
        </div>
        <div class="speaker-item">
          <div class="speaker-avatar" style="background:#27AE60;">王</div>
          <div class="speaker-info">
            <div class="speaker-name">王五</div>
            <div class="speaker-meta">2 个样本</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Speaker Detail -->
    <div class="detail-panel">
      <div class="detail-header">
        <span class="detail-name">张三</span>
        <div class="detail-actions">
          <button class="btn btn-secondary" style="height:28px;font-size:12px;">编辑</button>
          <button class="btn btn-danger-outline" style="height:28px;font-size:12px;">删除</button>
        </div>
      </div>
      <div class="detail-body">
        <!-- Basic Info -->
        <div class="section-title">基本信息</div>
        <div class="info-card">
          <div class="info-row">
            <span class="info-label">样本数</span>
            <span class="info-value">3</span>
          </div>
          <div class="info-row">
            <span class="info-label">创建时间</span>
            <span class="info-value">2026-06-14</span>
          </div>
          <div class="info-row">
            <span class="info-label">平均质量</span>
            <span class="info-value"><span class="quality-badge quality-good">0.90</span></span>
          </div>
        </div>

        <!-- Voiceprint Samples -->
        <div class="section-title">声纹样本</div>
        <div class="sample-card">
          <div class="sample-row">
            <span class="sample-label">样本 1</span>
            <span class="sample-source">manual_recording</span>
            <span class="quality-badge quality-good">0.92</span>
          </div>
          <div class="sample-row">
            <span class="sample-label">样本 2</span>
            <span class="sample-source">manual_recording</span>
            <span class="quality-badge quality-good">0.88</span>
          </div>
          <div class="sample-row">
            <span class="sample-label">样本 3</span>
            <span class="sample-source">auto_extracted</span>
            <span class="quality-badge quality-fair">0.72</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- StatusBar -->
<div class="statusbar">
  <span>音色库用于识别已注册的说话人</span>
  <span class="info">共 3 个说话人，6 个样本</span>
</div>

<!-- AddVoiceDialog Overlay -->
<div class="overlay">
  <div class="dialog">
    <div class="dialog-header">
      <div class="dialog-title">添加新说话人</div>
      <div class="dialog-subtitle">录音朗读以下文本，系统将自动提取声纹</div>
    </div>
    <div class="dialog-body">
      <div class="dialog-label">说话人姓名</div>
      <input class="dialog-input" type="text" placeholder="请输入姓名" value="">

      <div class="preset-card">
        <div class="preset-title">请朗读以下文本：</div>
        <div class="preset-text">你好，我是{姓名}，这是我的声纹样本。</div>

        <div class="preset-divider"></div>

        <!-- Recording State: Ready -->
        <div class="rec-state">
          <div class="rec-indicator"></div>
          <span class="rec-text">准备就绪</span>
        </div>

        <!-- Recording State: Active (hidden by default, show when recording) -->
        <!--
        <div class="rec-state">
          <div class="rec-indicator active"></div>
          <span class="rec-text active">录音中... 请朗读上述文本</span>
        </div>
        <div class="waveform active">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        -->
      </div>
    </div>
    <div class="dialog-footer">
      <button class="btn btn-danger" style="width:120px;justify-content:center;">开始录音</button>
      <button class="btn btn-primary" style="width:80px;justify-content:center;" disabled>保存</button>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:80px;justify-content:center;">取消</button>
    </div>
  </div>
</div>

</body>
</html>
